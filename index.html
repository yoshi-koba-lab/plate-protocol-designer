//============================================================
// Save / Load JSON
// Uses File System Access API when available so save & load
// share the same directory (default: Downloads).
//============================================================
let _lastDirHandle = null; // Remembered between save/load to keep them in sync
let _baseName = null;      // Filename base after first save or after load (no .json, no _revN)
let _revCount = 0;         // Next save's revision number (0 = no suffix)

function todayMMDDYY() {
  const d = new Date();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  const yy = String(d.getFullYear() % 100).padStart(2, "0");
  return mm + dd + yy;
}

function getSuggestedFilename() {
  if (_baseName === null) return todayMMDDYY() + ".json";
  if (_revCount === 0) return _baseName + ".json";
  return _baseName + "_rev" + _revCount + ".json";
}

function parseLoadedFilename(name) {
  let base = String(name || "").replace(/\.json$/i, "");
  const m = base.match(/^(.*)_rev(\d+)$/i);
  if (m) return { base: m[1], rev: parseInt(m[2], 10) };
  return { base: base, rev: 0 };
}

async function saveJSON() {
  const data = JSON.stringify(serializeState(), null, 2);
  const filename = getSuggestedFilename();

  if (window.showSaveFilePicker) {
    try {
      const opts = {
        suggestedName: filename,
        types: [{ description: "JSON", accept: { "application/json": [".json"] } }],
      };
      // Start in last-used dir if we have it, else Downloads
      if (_lastDirHandle) opts.startIn = _lastDirHandle;
      else opts.startIn = "downloads";
      const handle = await window.showSaveFilePicker(opts);
      const writable = await handle.createWritable();
      await writable.write(data);
      await writable.close();
      // Remember the directory for next time
      try {
        const parent = await handle.getParent?.();
        if (parent) _lastDirHandle = parent;
      } catch(_) {}
      // Adopt the actual saved filename as the new base for future revisions
      const parsed = parseLoadedFilename(handle.name || filename);
      _baseName = parsed.base;
      _revCount = parsed.rev + 1;
      return true;
    } catch (err) {
      if (err && err.name === "AbortError") return false; // user cancelled
      // Fall through to anchor-download fallback
      console.warn("showSaveFilePicker failed, falling back:", err);
    }
  }

  // Fallback: triggers browser default download folder
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  // We can't know what name the user actually chose; bump using suggested
  const parsed = parseLoadedFilename(filename);
  _baseName = parsed.base;
  _revCount = parsed.rev + 1;
  return true;
}

async function openJSON() {
  if (window.showOpenFilePicker) {
    try {
      const opts = {
        types: [{ description: "JSON", accept: { "application/json": [".json"] } }],
        multiple: false,
      };
      if (_lastDirHandle) opts.startIn = _lastDirHandle;
      else opts.startIn = "downloads";
      const [handle] = await window.showOpenFilePicker(opts);
      const file = await handle.getFile();
      try {
        const parent = await handle.getParent?.();
        if (parent) _lastDirHandle = parent;
      } catch(_) {}
      loadJSONFile(file);
      return;
      // (loadJSONFile sets _baseName / _revCount from file.name)
    } catch (err) {
      if (err && err.name === "AbortError") return;
      console.warn("showOpenFilePicker failed, falling back:", err);
    }
  }
  // Fallback to <input type=file>
  document.getElementById("file-input").click();
}

function loadJSONFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const obj = JSON.parse(e.target.result);
      if (loadFromObject(obj)) {
        // Adopt the loaded file's name as the base; next save bumps to _rev(N+1)
        const parsed = parseLoadedFilename(file.name);
        _baseName = parsed.base;
        _revCount = parsed.rev + 1;
        autosave(); pushHistory();
      } else {
        alert("ファイルを読み込めませんでした。");
      }
    } catch (err) {
      alert("JSONの読み込みに失敗しました: " + err.message);
    }
  };
  reader.readAsText(file);
}

// New Project
//============================================================
async function newProject() {
  // Detect whether the current state has any meaningful content
  const hasContent =
    state.plates.some(p => Object.keys(p.wells || {}).length > 0
                           || Object.keys(p.wellMemos || {}).length > 0
                           || (p.notes && p.notes.trim() !== ""))
    || state.axes.length > 0
    || (state.projectNotes && state.projectNotes.trim() !== "")
    || (state.projectName && state.projectName !== "Untitled Protocol");

  if (hasContent) {
    const choice = confirm("現在の内容を保存しますか？\n\n[OK] 保存してから新規作成\n[キャンセル] 保存しないで続行（破棄するか中止を選択できます）");
    if (choice) {
      await saveJSON();
    } else {
      const proceed = confirm("保存せずに新規作成しますか？\n現在の内容は失われます。");
      if (!proceed) return;
    }
  }

  // Reset state
  state.projectName = "Untitled Protocol";
  state.plates = [makePlate(24, "Plate 1")];
  state.axes = [];
  state.projectNotes = "";
  state.font = { family: "system", size: "auto", weight: "400" };

  // Reset filename tracking → next save defaults to today's date
  _baseName = null;
  _revCount = 0;

  document.getElementById("project-name").value = state.projectName;
  document.getElementById("project-notes").value = "";
  document.getElementById("font-family").value = "system";
  document.getElementById("font-size").value = "auto";
  document.getElementById("font-weight").value = "400";

  renderAxes();
  renderAllPlates();
  renderLegend();
  autosave();
  // Reset history with the fresh state
  _history = [];
  _historyIdx = -1;
  pushHistory();
}

//============================================================
// Wire up
//============================================================
document.getElementById("btn-add-axis").addEventListener("click", addAxis);
document.getElementById("btn-add-plate").addEventListener("click", addPlate);
document.getElementById("btn-select-all").addEventListener("click", selectAllEverywhere);
document.getElementById("btn-clear-selection").addEventListener("click", clearAllSelection);
document.getElementById("btn-clear-wells").addEventListener("click", clearSelectedWellsEverywhere);
document.getElementById("project-notes").addEventListener("input", e => {
  state.projectNotes = e.target.value; autosave();
});
document.getElementById("project-name").addEventListener("input", e => {
  state.projectName = e.target.value;
  autosave();
});
document.getElementById("btn-new").addEventListener("click", newProject);
document.getElementById("btn-save").addEventListener("click", saveJSON);
document.getElementById("btn-load").addEventListener("click", openJSON);
document.getElementById("file-input").addEventListener("change", e => {
  const f = e.target.files[0]; if (f) loadJSONFile(f);
  e.target.value = "";
});
document.getElementById("btn-export-png").addEventListener("click", exportPNG);
document.getElementById("btn-export-pdf").addEventListener("click", exportPDF);

document.getElementById("font-family").addEventListener("change", e => {
  state.font.family = e.target.value; renderAllPlates(); autosave();
});
document.getElementById("font-size").addEventListener("change", e => {
  state.font.size = e.target.value === "auto" ? "auto" : Number(e.target.value);
  renderAllPlates(); autosave();
});
document.getElementById("font-weight").addEventListener("change", e => {
  state.font.weight = e.target.value; renderAllPlates(); autosave();
});

document.getElementById("popover-color-input").addEventListener("input", e => {
  document.getElementById("popover-hex-input").value = e.target.value.toUpperCase();
});
document.getElementById("popover-color-input").addEventListener("change", e => {
  pickColor(e.target.value);
});
document.getElementById("popover-hex-input").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const v = normalizeHex(e.target.value);
    pickColor(v);
  }
});

// Keyboard shortcuts
window.addEventListener("keydown", e => {
  if (e.key === "Escape") { clearAllSelection(); return; }
  // Undo: Cmd+Z (Mac) or Ctrl+Z (Win)
  if (e.key === "z" && (e.metaKey || e.ctrlKey) && !e.shiftKey) {
    e.preventDefault();
    undo();
    return;
  }
  // Redo: Cmd+Shift+Z or Ctrl+Shift+Z or Ctrl+Y
  if ((e.key === "z" && (e.metaKey || e.ctrlKey) && e.shiftKey) ||
      (e.key === "y" && e.ctrlKey)) {
    e.preventDefault();
    redo();
    return;
  }
});

//============================================================
// Init
//============================================================
initLegendDrag();
if (!tryRestoreAutosave()) {
  const p = makePlate(24, "Plate 1");
  state.plates.push(p);
  addAxis();
}
if (state.plates.length === 0) {
  state.plates.push(makePlate(24, "Plate 1"));
}
document.getElementById("project-notes").value = state.projectNotes || "";
document.getElementById("version-badge").textContent = "v" + APP_VERSION;
renderAll();
// Seed initial history snapshot
pushHistory();
</script>
</body>
</html>
